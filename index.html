<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analog Clock</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #0f0f23;
    font-family: 'Segoe UI', sans-serif;
  }
  .clock {
    position: relative;
    width: 350px;
    height: 350px;
    border-radius: 50%;
    background: radial-gradient(ellipse at center, #1a1a3e 0%, #0d0d2b 100%);
    box-shadow:
      0 0 40px rgba(100, 100, 255, 0.15),
      inset 0 0 40px rgba(0, 0, 0, 0.4);
    border: 3px solid rgba(255, 255, 255, 0.08);
  }
  .clock .number {
    position: absolute;
    width: 100%;
    height: 100%;
    text-align: center;
    font-size: 20px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.7);
  }
  .clock .number span {
    display: inline-block;
    padding-top: 18px;
  }
  .tick {
    position: absolute;
    width: 100%;
    height: 100%;
  }
  .tick::before {
    content: '';
    position: absolute;
    top: 8px;
    left: 50%;
    width: 2px;
    height: 12px;
    background: rgba(255, 255, 255, 0.25);
    transform: translateX(-50%);
  }
  .tick.major::before {
    height: 0;
  }
  .center-dot {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 14px;
    height: 14px;
    background: #e74c3c;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    box-shadow: 0 0 8px rgba(231, 76, 60, 0.6);
  }
  .hand {
    position: absolute;
    bottom: 50%;
    left: 50%;
    transform-origin: bottom center;
    border-radius: 4px;
    z-index: 10;
  }
  .hour {
    width: 5px;
    height: 90px;
    margin-left: -2.5px;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 4px;
  }
  .minute {
    width: 3.5px;
    height: 120px;
    margin-left: -1.75px;
    background: rgba(255, 255, 255, 0.75);
    border-radius: 3px;
  }
  .second {
    width: 1.5px;
    height: 140px;
    margin-left: -0.75px;
    background: #e74c3c;
    z-index: 15;
  }
  .second::after {
    content: '';
    position: absolute;
    bottom: -30px;
    left: 50%;
    width: 1.5px;
    height: 30px;
    background: #e74c3c;
    transform: translateX(-50%);
  }
  .digital {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.4);
    font-size: 14px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<div class="clock" id="clock">
  <div class="hand hour" id="hour"></div>
  <div class="hand minute" id="minute"></div>
  <div class="hand second" id="second"></div>
  <div class="center-dot"></div>
  <div class="digital" id="digital"></div>
</div>

<script>
  const clock = document.getElementById('clock');

  // Generate hour numbers
  for (let i = 1; i <= 12; i++) {
    const num = document.createElement('div');
    num.className = 'number';
    num.style.transform = `rotate(${i * 30}deg)`;
    num.innerHTML = `<span style="transform:rotate(${-i * 30}deg)">${i}</span>`;
    clock.appendChild(num);
  }

  // Generate minute ticks
  for (let i = 0; i < 60; i++) {
    const tick = document.createElement('div');
    tick.className = i % 5 === 0 ? 'tick major' : 'tick';
    tick.style.transform = `rotate(${i * 6}deg)`;
    clock.appendChild(tick);
  }

  const hourHand = document.getElementById('hour');
  const minuteHand = document.getElementById('minute');
  const secondHand = document.getElementById('second');
  const digital = document.getElementById('digital');

  function updateClock() {
    const now = new Date();
    const h = now.getHours() % 12;
    const m = now.getMinutes();
    const s = now.getSeconds();
    const ms = now.getMilliseconds();

    const smoothS = s + ms / 1000;
    const smoothM = m + smoothS / 60;
    const smoothH = h + smoothM / 60;

    secondHand.style.transform = `rotate(${smoothS * 6}deg)`;
    minuteHand.style.transform = `rotate(${smoothM * 6}deg)`;
    hourHand.style.transform = `rotate(${smoothH * 30}deg)`;

    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(m).padStart(2, '0');
    const ss = String(s).padStart(2, '0');
    digital.textContent = `${hh}:${mm}:${ss}`;

    requestAnimationFrame(updateClock);
  }

  updateClock();
</script>

</body>
</html>
