<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analog Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .clock {
            width: 300px;
            height: 300px;
            border: 8px solid #2d3748;
            border-radius: 50%;
            background: radial-gradient(circle, #1e2a3a 0%, #0f1419 100%);
            position: relative;
            box-shadow: 
                0 0 20px rgba(0, 0, 0, 0.5),
                inset 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .clock-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .hour-marker {
            position: absolute;
            width: 4px;
            height: 12px;
            background: #e2e8f0;
            left: 50%;
            top: 8px;
            transform-origin: 0 140px;
            margin-left: -2px;
        }

        .hour-number {
            position: absolute;
            width: 30px;
            height: 30px;
            text-align: center;
            line-height: 30px;
            font-size: 18px;
            font-weight: bold;
            color: #e2e8f0;
            left: 50%;
            top: 20px;
            transform-origin: 0 125px;
            margin-left: -15px;
        }

        .minute-marker {
            position: absolute;
            width: 2px;
            height: 6px;
            background: #718096;
            left: 50%;
            top: 4px;
            transform-origin: 0 143px;
            margin-left: -1px;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 4px;
            z-index: 10;
        }

        .hour-hand {
            width: 6px;
            height: 70px;
            background: #e2e8f0;
            margin-left: -3px;
        }

        .minute-hand {
            width: 4px;
            height: 90px;
            background: #cbd5e0;
            margin-left: -2px;
        }

        .second-hand {
            width: 2px;
            height: 100px;
            background: #e53e3e;
            margin-left: -1px;
            z-index: 11;
        }

        .center-dot {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #e53e3e;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 12;
            box-shadow: 0 0 5px rgba(229, 62, 62, 0.5);
        }

        .digital-clock {
            position: absolute;
            bottom: -60px;
            width: 100%;
            text-align: center;
            color: #e2e8f0;
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            font-family: 'Courier New', monospace;
        }

        @media (max-width: 400px) {
            .clock {
                width: 250px;
                height: 250px;
            }

            .hour-marker {
                transform-origin: 0 112px;
            }

            .hour-number {
                transform-origin: 0 98px;
                font-size: 14px;
            }

            .minute-marker {
                transform-origin: 0 115px;
            }

            .hour-hand {
                height: 60px;
            }

            .minute-hand {
                height: 75px;
            }

            .second-hand {
                height: 85px;
            }

            .digital-clock {
                font-size: 20px;
                bottom: -50px;
            }
        }
    </style>
</head>
<body>
    <div class="clock">
        <div class="clock-face" id="clockFace"></div>
        <div class="hand hour-hand" id="hourHand"></div>
        <div class="hand minute-hand" id="minuteHand"></div>
        <div class="hand second-hand" id="secondHand"></div>
        <div class="center-dot"></div>
        <div class="digital-clock" id="digitalClock">00:00:00</div>
    </div>

    <script>
        function createClockFace() {
            const clockFace = document.getElementById('clockFace');
            
            // Create hour markers and numbers
            for (let i = 1; i <= 12; i++) {
                const marker = document.createElement('div');
                marker.className = 'hour-marker';
                marker.style.transform = `rotate(${i * 30}deg)`;
                clockFace.appendChild(marker);

                const number = document.createElement('div');
                number.className = 'hour-number';
                number.textContent = i;
                number.style.transform = `rotate(${i * 30}deg)`;
                clockFace.appendChild(number);
            }

            // Create minute markers (60)
            for (let i = 0; i < 60; i++) {
                if (i % 5 !== 0) { // Skip positions where hour markers exist
                    const marker = document.createElement('div');
                    marker.className = 'minute-marker';
                    marker.style.transform = `rotate(${i * 6}deg)`;
                    clockFace.appendChild(marker);
                }
            }
        }

        function updateClock() {
            const now = new Date();
            
            const seconds = now.getSeconds();
            const milliseconds = now.getMilliseconds();
            const minutes = now.getMinutes();
            const hours = now.getHours();

            // Calculate smooth positions
            const secondDegrees = ((seconds + milliseconds / 1000) / 60) * 360;
            const minuteDegrees = ((minutes + seconds / 60) / 60) * 360;
            const hourDegrees = ((hours % 12 + minutes / 60) / 12) * 360;

            // Update hand rotations
            document.getElementById('secondHand').style.transform = `rotate(${secondDegrees}deg)`;
            document.getElementById('minuteHand').style.transform = `rotate(${minuteDegrees}deg)`;
            document.getElementById('hourHand').style.transform = `rotate(${hourDegrees}deg)`;

            // Update digital clock
            const formattedTime = [hours, minutes, seconds]
                .map(v => v.toString().padStart(2, '0'))
                .join(':');
            document.getElementById('digitalClock').textContent = formattedTime;

            requestAnimationFrame(updateClock);
        }

        // Initialize
        createClockFace();
        requestAnimationFrame(updateClock);
    </script>
</body>
</html>
